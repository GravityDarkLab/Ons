# Development — hot reload via mounted volumes. No image build required.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml up api    # api only
#   docker compose -f docker-compose.dev.yml up frontend

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    image: oven/bun:1.2
    working_dir: /app
    command: bun run dev
    volumes:
      - ./api:/app                  # source mount — hot reload via --watch
      - api_modules:/app/node_modules  # isolated node_modules inside container
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:        development
      PORT:            3001
      MONGODB_URI:     mongodb://mongo:27017
      MONGODB_DB_NAME: ons
    env_file:
      - path: ./api/.env
        required: false             # optional in dev — can set vars above
    depends_on:
      - mongo

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    image: oven/bun:1.2
    working_dir: /app
    # install deps then start Vite bound to all interfaces (required in Docker)
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 5174"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL:    http://localhost:3001
    env_file:
      - path: ./frontend/.env.local
        required: false
    depends_on:
      - api

volumes:
  mongo_data_dev:
  api_modules:
  frontend_modules:

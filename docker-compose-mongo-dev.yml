name: matching-mongo-dev

services:
  mongo:
    image: mongo:7
    container_name: matching-mongo
    restart: unless-stopped
    command: ["--bind_ip_all", "--port", "27017"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-root}
      MONGO_INITDB_DATABASE: ${MONGO_APP_DB:-matching}
      MONGO_APP_DB: ${MONGO_APP_DB:-matching}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-matching_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-matching_app_dev_password}
    volumes:
      - mongo_data_dev:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'echo ''db.adminCommand("ping").ok'' | mongosh --quiet -u "${MONGO_ROOT_USERNAME:-root}" -p "${MONGO_ROOT_PASSWORD:-root}" --authenticationDatabase admin localhost:27017/admin | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - mongo_dev_net

  mongo-express:
    image: mongo-express:1
    container_name: matching-mongo-express
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-root}@mongo:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-devadmin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-devadmin}
      ME_CONFIG_OPTIONS_EDITORTHEME: default
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - mongo_dev_net

volumes:
  mongo_data_dev:

networks:
  mongo_dev_net:
    driver: bridge

server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # ── Reverse proxy → API ───────────────────────────────────────────────────
    # All /api/* requests are forwarded to the api container on the internal
    # Docker network. The API is never exposed externally.
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;
    }

    # ── React Router — SPA fallback ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — long-lived cache (Vite hashes filenames) ─────────────
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML — never cache ────────────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY"        always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "same-origin" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript
                    application/json image/svg+xml;
    gzip_min_length 1000;
}

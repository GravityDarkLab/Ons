<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A curated matchmaking experience where your identity stays private until we make the connection." />
    <title>Matching · Privacy-first matchmaking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // No-flash theme bootstrap: apply .dark before React mounts.
      // Scoped to the themed sections — public pages stay light.
      (function () {
        var p = location.pathname;
        if (!p.startsWith('/admin') && !p.startsWith('/profile')) return;
        try {
          var stored = localStorage.getItem('ons-theme');
          var dark = stored === 'dark' ||
            (stored !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* storage unavailable */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

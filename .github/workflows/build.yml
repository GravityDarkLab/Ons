name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck:
    name: Type-check API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install from the monorepo root — bun.lock lives here, not in api/
      - name: Install dependencies
        run: bun install --frozen

      - name: Run TypeScript type-check
        working-directory: api
        run: bun run typecheck

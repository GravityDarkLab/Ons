name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false  # never cancel a publish in flight

permissions:
  contents: read
  packages: write       # push to ghcr.io
  security-events: write  # upload Trivy image scan SARIF

jobs:
  build-push:
    name: Build, push & scan (API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Registry auth ──────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata / tags ──────────────────────────────────────────────
      # Produces tags like:
      #   ghcr.io/<owner>/<repo>/api:main
      #   ghcr.io/<owner>/<repo>/api:1.2.3       (on v1.2.3 tag)
      #   ghcr.io/<owner>/<repo>/api:1.2          (on v1.2.3 tag)
      #   ghcr.io/<owner>/<repo>/api:sha-abc1234
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # ── Build & push ───────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse the CI layer cache so publish builds are fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true   # SLSA build provenance attestation

      # ── Image vulnerability scan ───────────────────────────────────────────
      - name: Trivy — scan pushed image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}/api:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          # Don't gate the push on scan results — findings are surfaced in
          # the Security tab. Set exit-code: "1" to make this a hard gate.
          exit-code: "0"

      - name: Upload image scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-progress runs for the same branch/PR — no stale feedback.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Type-check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type-check (API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen

      - name: Type-check
        working-directory: api
        run: bun run typecheck

  # ── Docker build ────────────────────────────────────────────────────────────
  # Validates that the Dockerfile still builds cleanly.
  # Does NOT push — pushing is handled by docker-publish.yml on main/tags.
  docker-build:
    name: Docker build (API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: false
          # GitHub Actions cache — keeps layer cache warm across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

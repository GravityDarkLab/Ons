name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── API ─────────────────────────────────────────────────────────────────────

  typecheck-api:
    name: Type-check (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen
      - run: bun run typecheck
        working-directory: api

  test-api:
    name: Test (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen
      - run: bun run test
        working-directory: api

  # ── Frontend ─────────────────────────────────────────────────────────────────

  typecheck-frontend:
    name: Type-check (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen
      - run: bun run typecheck
        working-directory: frontend

  build-frontend:
    name: Build (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen
      - run: bun run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3001
          VITE_INVITE_KEY: ci-build-check # gitguardian:ignore

  # ── Docker ──────────────────────────────────────────────────────────────────
  # Gate on fast checks first — Docker builds are slow and should only run
  # when the code is already known-good.
  # These jobs do NOT push; releasing images is handled by docker-publish.yml.

  docker-api:
    name: Docker build (API)
    runs-on: ubuntu-latest
    needs: [typecheck-api, test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          file: api/Dockerfile
          push: false
          cache-from: type=gha,scope=docker-api
          cache-to: type=gha,mode=max,scope=docker-api

  docker-frontend:
    name: Docker build (Frontend)
    runs-on: ubuntu-latest
    needs: [typecheck-frontend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          build-args: |
            VITE_API_URL=http://localhost:3001
            VITE_INVITE_KEY=ci-build-check
          cache-from: type=gha,scope=docker-frontend
          cache-to: type=gha,mode=max,scope=docker-frontend

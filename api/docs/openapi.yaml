openapi: 3.1.0

info:
  title: Ons — Matching Platform API
  description: |
    Privacy-oriented couple matching backend for the Ons (أنس) platform.

    **Privacy model:** Instagram handles are never stored in the applicant profile.
    They are AES-256-GCM encrypted in a separate `identities` collection and
    resolvable only by authorized admin roles (every access is audit-logged).
    Applicants are identified throughout the system by a human-friendly alias
    such as "Blue Falcon" or "Silent River".

    **Authentication:**
    - Admin endpoints are protected by a session cookie (`admin_token`) set by
      `POST /api/v1/admin/login`. The cookie is `HttpOnly` and `SameSite=Lax`.
      API clients may alternatively pass the raw JWT in the `Authorization: Bearer` header.
    - Applicant profile endpoints use a separate JWT delivered as an `HttpOnly`
      `ons_applicant_session` cookie, set by `POST /api/v1/profile/login` and
      `POST /api/v1/profile/set-password`. The browser sends it automatically.
      API clients may use `Authorization: Bearer <token>` as a fallback.
      Admin JWTs are rejected on applicant endpoints and vice-versa.

    **Rate limits:**
    - Public form submission: 100 requests per 10 minutes per IP
    - Admin login: 10 requests per minute per IP
    - Admin endpoints: 200 requests per minute per IP
    - Profile login: 10 requests per minute per IP
    - Profile endpoints: 100 requests per minute per IP
  version: 1.0.0
  contact:
    name: Admin

servers:
  - url: http://localhost
    description: Docker — nginx reverse proxy (default)
  - url: http://localhost:3001
    description: Local development — direct Bun server (no Docker)
  - url: https://api.yourdomain.com
    description: Production

tags:
  - name: Health
    description: Server liveness check
  - name: Form
    description: Public form submission (no auth required)
  - name: Profile
    description: Applicant self-service portal (applicant JWT required)
  - name: Admin – Auth
    description: "Session management: login, logout, and session probe"
  - name: Admin – Applicants
    description: Manage applicant profiles (session required)
  - name: Admin – Questionnaires
    description: Manage questionnaire versions (session required)
  - name: Admin – Audit
    description: View audit logs (session required)
  - name: Matching
    description: Matching engine endpoints

# ─── Security ──────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: admin_token
      description: |
        HttpOnly session cookie set by `POST /api/v1/admin/login`.
        The browser sends it automatically on every request to `/api/v1/admin/*`.
        The cookie is invisible to JavaScript (`HttpOnly`), `SameSite=Lax`, and
        `Secure` in production. Valid for 8 hours (configurable via `JWT_EXPIRY`).

    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Fallback for API clients and tooling that cannot send cookies.
        Pass the raw JWT from `POST /api/v1/admin/login` (when testing via curl or
        this Swagger UI). The server tries the cookie first; the header is used only
        when no cookie is present.
        Claims: `sub` = admin MongoDB `_id`, `role` = one of `super_admin | admin | viewer`.

    ApplicantCookieAuth:
      type: apiKey
      in: cookie
      name: ons_applicant_session
      description: |
        HttpOnly session cookie set by `POST /api/v1/profile/login` and
        `POST /api/v1/profile/set-password`. The browser sends it automatically
        on every request to `/api/v1/profile/*`.
        The cookie is invisible to JavaScript (`HttpOnly`), `SameSite=Lax`, and
        `Secure` in production. Valid for 30 days.

    ApplicantBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Fallback for API clients and tooling that cannot send cookies.
        Claims: `sub` = applicant MongoDB `_id`, `alias` = human-friendly codename,
        `type` = `"applicant"` (distinguishes from admin JWTs which carry `role` instead).
        Valid for 30 days. Admin JWTs are rejected on all `/api/v1/profile/*` endpoints.
        The server tries the cookie first; the header is used only when no cookie is present.

    SubmissionKey:
      type: apiKey
      in: header
      name: X-Submission-Key
      description: |
        64-character hex key obtained from `GET /api/v1/form/questionnaire`.
        Call that endpoint first, copy the `submissionKey` from the response,
        then paste it here before trying out `POST /submit`.

  responses:
    Unauthorized:
      description: Missing or invalid session (cookie absent/expired or bad Bearer token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: "Unauthorized"

  # ─── Reusable schemas ────────────────────────────────────────────────────────
  schemas:

    # ── Errors ────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
          example: "Internal server error"

    ValidationErrorResponse:
      type: object
      required: [success, error, details]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
          example: "Validation failed"
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            age: ["Must be at least 18 years old"]
            disclaimer_agreed: ["You must agree to the disclaimer"]

    # ── Form ──────────────────────────────────────────────────────────────────
    FormAnswers:
      type: object
      required:
        - instagram_handle
        - location
        - age
        - work
        - gender_identity
        - sexual_orientation
        - religion
        - vibe_words
        - lifestyle
        - relationship_type
        - open_to_long_distance
        - preferred_physical_traits
        - preferred_character_traits
        - deal_breakers
        - okay_with_opposite_gender_friends
        - religion_deal_breaker
        - physical_affection_importance
        - dream_first_date
        - disclaimer_agreed
      properties:
        instagram_handle:
          type: string
          pattern: '^@?[\w.]+$'
          example: "@johndoe"
          description: "Sensitive — stored encrypted, never appears in matching profile."
        location:
          type: string
          example: "Paris, France"
        age:
          type: integer
          minimum: 18
          example: 27
        height_cm:
          type: integer
          minimum: 100
          maximum: 250
          example: 178
        work:
          type: string
          example: "Software Engineer"
        gender_identity:
          type: string
          enum: [Male, Female, Non-binary, Genderqueer, "Prefer not to say", Other]
          example: "Male"
        sexual_orientation:
          type: string
          enum: [Straight, Gay, Lesbian, Bisexual, Pansexual, Asexual, "Prefer not to say", Other]
          example: "Straight"
        religion:
          type: string
          example: "Agnostic"
        vibe_words:
          type: string
          example: "curious, calm, funny"
          description: "Three words describing your vibe."
        lifestyle:
          type: string
          example: "Social drinker, non-smoker"
        relationship_type:
          type: string
          enum: ["Long Term", "Short Term", "Open to Both", "Casual", "Not Sure"]
          example: "Long Term"
        open_to_long_distance:
          type: boolean
          example: true
        preferred_physical_traits:
          type: string
          example: "Athletic, tall"
        preferred_character_traits:
          type: string
          example: "Ambitious, kind, funny"
        deal_breakers:
          type: string
          example: "Dishonesty, smoking"
        okay_with_opposite_gender_friends:
          type: boolean
          example: true
        religion_deal_breaker:
          type: boolean
          example: false
        physical_affection_importance:
          type: integer
          minimum: 1
          maximum: 10
          example: 8
          description: "Scale from 1 (low) to 10 (very important)."
        dream_first_date:
          type: string
          example: "Coffee at a bookstore, then a walk by the river"
        disclaimer_agreed:
          type: boolean
          enum: [true]
          description: "Must be exactly `true`. User consents to data collection for matchmaking only."

    QuestionnaireQuestion:
      type: object
      required: [id, label, type, sensitive, required, order]
      properties:
        id:
          type: string
          example: "instagram_handle"
        label:
          type: string
          example: "Instagram Handle"
        type:
          type: string
          enum: [text, number, select, multiselect, range, boolean, textarea]
        sensitive:
          type: boolean
          description: "If true, the answer is encrypted and stored separately."
        required:
          type: boolean
        order:
          type: integer
        options:
          type: array
          items:
            type: string
          description: "Only present for select/multiselect questions."
        min:
          type: number
          description: "Only present for number/range questions."
        max:
          type: number
        placeholder:
          type: string

    QuestionnaireSection:
      type: object
      required: [id, title, order, questions]
      properties:
        id:
          type: string
          example: "identity"
        title:
          type: string
          example: "Your Identity"
        order:
          type: integer
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionnaireQuestion'

    QuestionnaireResponse:
      description: "Returned by GET /questionnaire?filter=active"
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [version, name, isActive, sections, submissionKey]
          properties:
            version:
              type: string
              example: "1.0.0"
            name:
              type: string
              example: "Matching Form v1"
            isActive:
              type: boolean
              example: true
            sections:
              type: array
              items:
                $ref: '#/components/schemas/QuestionnaireSection'
            submissionKey:
              type: string
              format: hex
              minLength: 64
              maxLength: 64
              description: |
                HMAC-SHA256 of the version string, signed with a server secret.
                Must be included verbatim in the `submissionKey` field of POST /submit.
                Prevents version enumeration — a key for v1.0.0 cannot be forged or reused for another version.
              example: "a3f9d2c1e4b7089f..."

    QuestionnaireListResponse:
      description: "Returned by GET /questionnaire?filter=all"
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            type: object
            required: [version, name, isActive, createdAt, updatedAt]
            properties:
              version:
                type: string
                example: "1.0.0"
              name:
                type: string
                example: "Matching Form v1"
              isActive:
                type: boolean
                example: true
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time

    CreateQuestionnaireRequest:
      type: object
      required: [version, name, sections]
      properties:
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
          example: "2.0.0"
          description: "Must be a new version — cannot overwrite an existing one."
        name:
          type: string
          example: "Matching Form v2"
        sections:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QuestionnaireSection'

    FormSubmissionRequest:
      type: object
      required: [questionnaireVersion, answers]
      properties:
        questionnaireVersion:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
          example: "1.0.0"
          description: "Semver version of the questionnaire this submission targets."
        answers:
          $ref: '#/components/schemas/FormAnswers'

    FormSubmissionResponse:
      type: object
      required: [success, alias, applicantId, magicToken, message]
      properties:
        success:
          type: boolean
          enum: [true]
        alias:
          type: string
          example: "Blue Falcon"
          description: "Human-friendly codename assigned to this applicant. This is their permanent identifier in the matching system."
        applicantId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
          description: "MongoDB ObjectId hex string."
        magicToken:
          type: string
          format: hex
          minLength: 64
          maxLength: 64
          example: "a3f9d2c1e4b7089f..."
          description: |
            64-character hex token used as the login identifier for the applicant portal.
            Append to the portal URL as `?token=<value>` so the login form is pre-filled.
            Stored as a SHA-256 hash on the server — the raw token is given to the applicant
            only at form submission and is never persisted in plaintext. Treat it like a
            username — it is not sufficient to log in without a password.
            No password is generated at submission time. The applicant sets their own
            password on first login via `POST /api/v1/profile/set-password`.
        message:
          type: string
          example: "Your profile has been submitted successfully. Save your magic link — you will set your password on first login."

    # ── Profile (applicant self-service) ─────────────────────────────────────
    ProfileLoginRequest:
      type: object
      required: [magicToken]
      properties:
        magicToken:
          type: string
          format: hex
          minLength: 64
          maxLength: 64
          example: "a3f9d2c1e4b7089f..."
          description: "64-char hex token from the form submission response."
        password:
          type: string
          example: "amber-river-silent-fox"
          description: |
            The applicant's password. Optional — omit to probe for first-login state
            without attempting password verification. If the account has no password set,
            the server returns `{ firstLogin: true }` regardless of whether this field
            is present.

    ProfileLoginResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]
        firstLogin:
          type: boolean
          enum: [true]
          description: |
            Present (and `true`) when the account has no password yet.
            The caller should redirect to `POST /api/v1/profile/set-password`.
            When absent, the session cookie has been set — proceed to the dashboard.

    ApplicantProfileView:
      type: object
      required: [applicantId, alias, status, scoreThreshold, createdAt]
      properties:
        applicantId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        alias:
          type: string
          example: "Blue Falcon"
        status:
          $ref: '#/components/schemas/ApplicantStatus'
        scoreThreshold:
          type: number
          format: float
          minimum: 0.6
          maximum: 1.0
          default: 0.8
          example: 0.8
          description: "Minimum score a match must reach to appear in the portal. Clamped to [0.6, 1.0]."
        createdAt:
          type: string
          format: date-time

    MatchStatus:
      type: string
      enum: [proposed, in_progress, dating, success, failed, declined, expired]
      description: |
        - `proposed` — algorithm suggested this pair; both see each other anonymously
        - `in_progress` — initiator revealed partner's Instagram; partner can accept/decline
        - `dating` — partner accepted; both confirmed; other matches hidden
        - `success` — self-reported: worked out; both applicants → `inactive`
        - `failed` — self-reported: didn't work out; both applicants → `applied`
        - `declined` — partner explicitly declined the contact request
        - `expired` — a participant went `inactive` before the match concluded

    MatchPerspective:
      type: string
      enum: [none, initiator, target]
      description: |
        - `none` — match is `proposed`; neither side has initiated contact yet
        - `initiator` — authenticated applicant sent the contact request
        - `target` — authenticated applicant received the contact request

    ApplicantMatchView:
      type: object
      required: [matchId, partnerAlias, score, status, perspective]
      properties:
        matchId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d5"
        partnerAlias:
          type: string
          example: "Silent River"
          description: "Partner's alias — no Instagram handle is ever included."
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.83
        status:
          $ref: '#/components/schemas/MatchStatus'
        perspective:
          $ref: '#/components/schemas/MatchPerspective'
        iceBreakers:
          type: array
          items:
            type: string
          description: "AI-generated ice-breaking questions. Only present when `perspective = initiator` AND `status = in_progress`."
          example: ["What's the most spontaneous trip you've taken?", "What does your ideal Sunday look like?"]
        contactRequestedAt:
          type: string
          format: date-time
          description: |
            When the initiator clicked "contact". Present for **both** perspectives
            when `status = in_progress`. The target can use this to show "X minutes ago".
          example: "2026-06-09T14:32:00.000Z"
        dateIdeas:
          type: array
          items:
            type: string
          description: "AI-generated date ideas based on both profiles. Same visibility rule as `iceBreakers`."
          example: ["Coffee walk through the old city", "Sunset picnic with homemade snacks"]

    ContactResult:
      type: object
      required: [targetInstagram, iceBreakers, dateIdeas]
      properties:
        targetInstagram:
          type: string
          example: "@partner_handle"
          description: "Decrypted Instagram handle of the match partner. Triggers an `APPLICANT_REVEAL_IDENTITY` audit log entry."
        iceBreakers:
          type: array
          items:
            type: string
          example: ["What's the most spontaneous trip you've taken?", "What does your ideal Sunday look like?"]
        dateIdeas:
          type: array
          items:
            type: string
          example: ["Coffee walk through the old city", "Sunset picnic with homemade snacks"]

    # ── Auth ──────────────────────────────────────────────────────────────────
    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: "admin"
        password:
          type: string
          format: password
          example: "s3cr3t"

    AdminLoginResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]
      description: |
        The JWT is not returned in the body. It is delivered as an `HttpOnly`
        cookie (`admin_token`) via the `Set-Cookie` response header.

    AdminMeResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [adminId, adminUsername, adminRole]
          properties:
            adminId:
              type: string
              description: MongoDB `_id` of the authenticated admin.
              example: "507f1f77bcf86cd799439011"
            adminUsername:
              type: string
              description: Username of the authenticated admin.
              example: "alice"
            adminRole:
              type: string
              enum: [super_admin, admin, viewer]
              example: "admin"

    # ── Applicant ─────────────────────────────────────────────────────────────
    ApplicantStatus:
      type: string
      enum: [applied, matched, dating, inactive]
      description: |
        - `applied` — submitted the form; awaiting first matching run
        - `matched` — has ≥1 proposed match; still in matching pool
        - `dating` — actively dating one match; excluded from new runs
        - `inactive` — deactivated (self or admin); deletion scheduled in 180 days

    Applicant:
      type: object
      required: [_id, alias, questionnaireVersion, answers, status, createdAt, updatedAt]
      properties:
        _id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        alias:
          type: string
          example: "Blue Falcon"
        questionnaireVersion:
          type: string
          example: "1.0.0"
        answers:
          type: object
          description: "All non-sensitive answers. instagram_handle is never present."
          additionalProperties: true
          example:
            location: "Paris, France"
            age: 27
            height_cm: 178
            work: "Software Engineer"
            relationship_type: "Long Term"
        status:
          $ref: '#/components/schemas/ApplicantStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApplicantListResponse:
      type: object
      required: [success, data, pagination]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Applicant'
        pagination:
          type: object
          required: [page, limit, total, totalPages]
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            total:
              type: integer
              example: 142
            totalPages:
              type: integer
              example: 8

    ApplicantResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/Applicant'

    IdentityResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [alias, instagramHandle, applicantId]
          properties:
            alias:
              type: string
              example: "Blue Falcon"
            instagramHandle:
              type: string
              example: "@johndoe"
              description: "Decrypted Instagram handle. This response is audit-logged."
            applicantId:
              type: string
              example: "64f1a2b3c4d5e6f7a8b9c0d1"

    # ── Audit log ─────────────────────────────────────────────────────────────
    AuditLogEntry:
      type: object
      required: [_id, adminId, action, ipAddress, userAgent, timestamp]
      properties:
        _id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d2"
        adminId:
          type: string
          description: |
            MongoDB `_id` of the actor who performed the action.
            For all admin-initiated actions this is the admin's `_id`.
            For `APPLICANT_REVEAL_IDENTITY` this is the applicant's `_id` —
            check `metadata.actorType` to distinguish the two cases.
          example: "507f1f77bcf86cd799439011"
        action:
          type: string
          enum:
            - RESOLVE_IDENTITY
            - LIST_APPLICANTS
            - VIEW_APPLICANT
            - DEACTIVATE_APPLICANT
            - ADMIN_LOGIN
            - APPLICANT_REVEAL_IDENTITY
          description: |
            `APPLICANT_REVEAL_IDENTITY` is written when an applicant calls
            `POST /api/v1/profile/matches/:id/contact` to reveal their partner's
            Instagram handle. In this case `adminId` holds the applicant's MongoDB `_id`
            and `metadata.actorType` is `"applicant"` — use that field to distinguish
            applicant-initiated entries from admin-initiated ones in audit queries.
        targetAlias:
          type: string
          example: "Blue Falcon"
        targetApplicantId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        ipAddress:
          type: string
          example: "203.0.113.42"
        userAgent:
          type: string
          example: "Mozilla/5.0 ..."
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    AuditLogListResponse:
      type: object
      required: [success, data, pagination]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        pagination:
          type: object
          required: [page, limit, total, totalPages]
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer

    # ── Matching ──────────────────────────────────────────────────────────────
    MatchScoreBreakdown:
      type: object
      description: |
        Per-dimension scores, each in [0, 1]. Fields vary by algorithm:

        **baseline** fields:
        `relationship_type`, `deal_breakers`, `religion_compatibility`,
        `affection_importance`, `long_distance`, `lifestyle`

        **cosine** fields:
        `numeric_compatibility`, `lifestyle_similarity`,
        `character_cross_match`, `character_a_wants_b`, `character_b_wants_a`,
        `deal_breaker_penalty`

        **embedding-cosine** fields: same keys as `cosine` — values are
        semantically richer because text fields are embedded rather than
        bag-of-words matched.
      additionalProperties:
        type: number
        format: float
        minimum: 0
        maximum: 1
      example:
        numeric_compatibility: 0.91
        lifestyle_similarity: 0.78
        character_cross_match: 0.85
        character_a_wants_b: 0.88
        character_b_wants_a: 0.82
        deal_breaker_penalty: 0.94

    RankedCandidate:
      type: object
      required: [alias, applicantId, score, breakdown]
      properties:
        alias:
          type: string
          example: "Silent River"
        applicantId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d3"
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.83
          description: "Weighted composite score across all dimensions."
        breakdown:
          $ref: '#/components/schemas/MatchScoreBreakdown'

    CandidatesResponse:
      type: object
      required: [success, applicantId, candidates]
      properties:
        success:
          type: boolean
          enum: [true]
        applicantId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/RankedCandidate'

    MatchingRunRequest:
      type: object
      properties:
        algorithm:
          type: string
          enum: [baseline, cosine, embedding-cosine]
          default: embedding-cosine
          description: |
            **⚠️ Multilingual note:** The platform supports EN / DE / FR / AR.
            Applicants may submit free-text fields (vibe, lifestyle, traits) in any language.
            Only `embedding-cosine` handles cross-language semantic matching correctly.
            `baseline` and `cosine` use keyword overlap — they will produce degraded results
            when comparing applicants who filled the form in different languages.
            Use a multilingual embedding model (e.g. `text-embedding-3-small` via OpenAI,
            or `paraphrase-multilingual-mpnet-base-v2` via Ollama/LM Studio).

            **embedding-cosine** *(default, recommended)* — Replaces keyword matching with
            dense vector embeddings. "driven" ≈ "ambitious" ≈ "ehrgeizig" ≈ "طموح" because
            they map to nearby vectors in embedding space. Requires `EMBEDDING_PROVIDER`
            to be configured (openai or local via LM Studio/Ollama).
            Uses a `prepare()` step to batch-embed all applicants before scoring — O(N) API calls.

            **baseline** — Weighted rule-based scoring across 6 hand-crafted dimensions
            (relationship type, deal breakers, religion, affection, long distance, lifestyle).
            Fast, zero external dependencies. ⚠️ Free-text fields are not compared — no
            multilingual degradation but also no semantic depth.

            **cosine** — Cosine similarity on encoded feature vectors. ⚠️ Uses keyword
            overlap for text fields ("driven" ≠ "ambitieux") — poor results for
            multilingual applicant pools.

    MatchingRunResponse:
      type: object
      required: [success, algorithm, totalApplicants, durationMs, results]
      properties:
        success:
          type: boolean
          enum: [true]
        algorithm:
          type: string
          enum: [baseline, cosine, embedding-cosine]
          example: "embedding-cosine"
        totalApplicants:
          type: integer
          description: "Number of active applicants included in this pass."
          example: 42
        durationMs:
          type: integer
          description: "Wall-clock time for the full matching pass in milliseconds."
          example: 1240
        results:
          type: object
          description: "Map of applicantId → top 10 ranked candidates."
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/RankedCandidate'

# ─── Paths ─────────────────────────────────────────────────────────────────────
paths:

  # ── Health ───────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Server health check
      operationId: getHealth
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time
                  env:
                    type: string
                    example: "development"

  # ── Form ─────────────────────────────────────────────────────────────────────
  /api/v1/form/questionnaire:
    get:
      tags: [Form]
      summary: Get questionnaire(s)
      operationId: getQuestionnaire
      description: |
        Returns questionnaire data depending on the `filter` query parameter.

        **`filter=active` (default)** — Returns the single active questionnaire
        with full section/question data and a `submissionKey`. The key is an
        HMAC-SHA256 of the version string, version-bound and required by
        `POST /submit`. Prevents bots from enumerating versions without first
        fetching from this endpoint.

        **`filter=all`** — Returns a list of all questionnaires (active and
        historical), newest first. Omits sections and submissionKey — useful
        for admin UIs or version inspection.
      parameters:
        - in: query
          name: filter
          schema:
            type: string
            enum: [active, all]
            default: active
          required: false
          description: "`active` returns the single active questionnaire with submissionKey. `all` returns a summary list of every version."
      responses:
        '200':
          description: Questionnaire data
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/QuestionnaireResponse'
                  - $ref: '#/components/schemas/QuestionnaireListResponse'
              examples:
                active:
                  summary: filter=active (default)
                  value:
                    success: true
                    data:
                      version: "1.0.0"
                      name: "Matching Form v1"
                      isActive: true
                      submissionKey: "<64-hex-hmac-key>"
                      sections:
                        - id: "identity"
                          title: "Your Identity"
                          order: 1
                          questions:
                            - id: "instagram_handle"
                              label: "Instagram Handle"
                              type: "text"
                              sensitive: true
                              required: true
                              order: 1
                              placeholder: "@yourhandle"
                all:
                  summary: filter=all
                  value:
                    success: true
                    data:
                      - version: "1.0.0"
                        name: "Matching Form v1"
                        isActive: true
                        createdAt: "2026-01-01T00:00:00.000Z"
                        updatedAt: "2026-01-01T00:00:00.000Z"
                      - version: "0.9.0"
                        name: "Matching Form beta"
                        isActive: false
                        createdAt: "2025-11-01T00:00:00.000Z"
                        updatedAt: "2025-12-01T00:00:00.000Z"
        '400':
          description: Invalid filter value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: 'Invalid filter value. Use "active" or "all".'
        '404':
          description: No active questionnaire found (only when filter=active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "No active questionnaire found"

  /api/v1/form/submit:
    post:
      tags: [Form]
      summary: Submit a matching form
      operationId: submitForm
      security:
        - SubmissionKey: []
      description: |
        Accepts a completed questionnaire. The `instagram_handle` answer is
        encrypted and stored separately — it never appears in the returned data
        or the matching profile. The applicant receives a human-friendly alias.

        **Requires** `X-Submission-Key` header — call `GET /api/v1/form/questionnaire`
        first, copy the `submissionKey` from the response, then click **Authorize**
        and paste it under **SubmissionKey**.

        **Rate limit:** 100 requests per 10 minutes per IP.
      parameters:
        - in: header
          name: X-Submission-Key
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
          description: "64-char hex key from `GET /api/v1/form/questionnaire` → `data.submissionKey`."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormSubmissionRequest'
            example:
              questionnaireVersion: "1.0.0"
              answers:
                instagram_handle: "@johndoe"
                location: "Paris, France"
                age: 27
                height_cm: 178
                work: "Software Engineer"
                gender_identity: "Male"
                sexual_orientation: "Straight"
                religion: "Agnostic"
                vibe_words: "curious, calm, funny"
                lifestyle: "Social drinker, non-smoker"
                relationship_type: "Long Term"
                open_to_long_distance: true
                preferred_physical_traits: "Athletic, tall"
                preferred_character_traits: "Ambitious, kind, funny"
                deal_breakers: "Dishonesty, smoking"
                okay_with_opposite_gender_friends: true
                religion_deal_breaker: false
                physical_affection_importance: 8
                dream_first_date: "Coffee at a bookstore, then a walk by the river"
                disclaimer_agreed: true
      responses:
        '201':
          description: Form submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormSubmissionResponse'
              example:
                success: true
                alias: "Blue Falcon"
                applicantId: "64f1a2b3c4d5e6f7a8b9c0d1"
                magicToken: "a3f9d2c1e4b7089f4a2c8d1e6f3b9a0c..."
                message: "Your profile has been submitted successfully. Save your magic link — you will set your password on first login."
        '409':
          description: Instagram handle already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "An account already exists for this handle. Check your saved access link and password. If you need help, contact support."
        '400':
          description: Questionnaire version not found, inactive, or invalid submission key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_key:
                  summary: Bad submission key
                  value:
                    success: false
                    error: "Invalid submission key."
                inactive_version:
                  summary: Version no longer active
                  value:
                    success: false
                    error: "Questionnaire version 1.0.0 is no longer active. Please use the latest version."
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Too many form submissions. Please wait before trying again."

  # ── Admin – Auth ─────────────────────────────────────────────────────────────
  /api/v1/admin/login:
    post:
      tags: [Admin – Auth]
      summary: Admin login
      operationId: adminLogin
      description: |
        Authenticates an admin against the `admins` collection (bcrypt-verified).
        On success, sets an `HttpOnly` `admin_token` session cookie — the JWT is
        **not** present in the response body. The login action is recorded in the
        audit log.

        **Rate limit:** 20 requests per minute per IP.

        > **Swagger UI note:** browsers cannot read the `HttpOnly` cookie set here,
        > so Swagger UI cannot automatically send it on subsequent calls. To test
        > protected endpoints in this UI, use the **BearerAuth** scheme: copy the
        > raw token from the `Set-Cookie` header (visible in DevTools) and paste it
        > under the **Authorize** button.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Login successful — session cookie set
          headers:
            Set-Cookie:
              description: |
                `admin_token=<jwt>; Path=/api/v1/admin; HttpOnly; SameSite=Lax`
                (`Secure` added in production). Expires after `JWT_EXPIRY` (default 8 h).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
              example:
                success: true
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Invalid credentials"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/logout:
    post:
      tags: [Admin – Auth]
      summary: Admin logout
      operationId: adminLogout
      description: |
        Clears the `admin_token` session cookie. Safe to call even when not
        authenticated — always returns 200.
      responses:
        '200':
          description: Logged out (cookie cleared)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
              example:
                success: true

  /api/v1/admin/me:
    get:
      tags: [Admin – Auth]
      summary: Session probe — current admin identity
      operationId: adminMe
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: |
        Returns the authenticated admin's ID and role from the verified JWT claims.
        Used by the frontend on page load to determine whether the session cookie
        is still valid without storing any credential in JavaScript.

        Returns `401` if the cookie is absent or expired.
      responses:
        '200':
          description: Active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMeResponse'
              example:
                success: true
                data:
                  adminId: "507f1f77bcf86cd799439011"
                  adminUsername: "alice"
                  adminRole: "admin"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Admin – Applicants ───────────────────────────────────────────────────────
  /api/v1/admin/applicants:
    get:
      tags: [Admin – Applicants]
      summary: List applicants
      operationId: listApplicants
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: |
        Returns a paginated list of applicant profiles. No sensitive data
        (instagram handles) is included. Audit-logged as LIST_APPLICANTS.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ApplicantStatus'
          example: applied
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated applicant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/applicants/{id}:
    get:
      tags: [Admin – Applicants]
      summary: Get an applicant by ID
      operationId: getApplicant
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: "Returns the full applicant profile (no sensitive data). Audit-logged as VIEW_APPLICANT."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
      responses:
        '200':
          description: Applicant profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicantResponse'
        '400':
          description: Invalid ObjectId format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Applicant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Admin – Applicants]
      summary: Deactivate an applicant
      operationId: deactivateApplicant
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: |
        Sets the applicant status to `inactive`. Does not delete data.
        Deletion is scheduled 180 days from deactivation.
        Audit-logged as DEACTIVATE_APPLICANT.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
      responses:
        '200':
          description: Applicant deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  message:
                    type: string
                    example: "Applicant deactivated successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Applicant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/applicants/{id}/identity:
    get:
      tags: [Admin – Applicants]
      summary: Resolve applicant identity (decrypt Instagram handle)
      operationId: resolveIdentity
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: |
        Decrypts and returns the real Instagram handle for an applicant.

        🔒 **Requires `super_admin` role.** Regular `admin` and `viewer` roles receive 403.

        ⚠️ **Every call to this endpoint is recorded in the audit log** with the
        admin ID, IP address, user-agent, timestamp, and target alias.
        Use only when necessary for matchmaking coordination.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
      responses:
        '200':
          description: Decrypted identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResponse'
              example:
                success: true
                data:
                  alias: "Blue Falcon"
                  instagramHandle: "@johndoe"
                  applicantId: "64f1a2b3c4d5e6f7a8b9c0d1"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient role — super_admin required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Forbidden"
        '404':
          description: Identity record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Admin – Questionnaires ───────────────────────────────────────────────────
  /api/v1/admin/questionnaires:
    post:
      tags: [Admin – Questionnaires]
      summary: Create questionnaire
      operationId: createQuestionnaire
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: |
        Creates a new questionnaire and atomically deactivates all existing ones.
        Only one questionnaire can be active at a time — this is enforced server-side.
        The new version must not already exist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuestionnaireRequest'
            example:
              version: "2.0.0"
              name: "Matching Form v2"
              sections:
                - id: "identity"
                  title: "Your Identity"
                  order: 1
                  questions:
                    - id: "instagram_handle"
                      label: "Instagram Handle"
                      type: "text"
                      sensitive: true
                      required: true
                      order: 1
                      placeholder: "@yourhandle"
      responses:
        '201':
          description: Questionnaire created and previous versions deactivated
          content:
            application/json:
              schema:
                type: object
                required: [success, id, version, deactivatedCount, message]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  id:
                    type: string
                    example: "64f1a2b3c4d5e6f7a8b9c0d1"
                  version:
                    type: string
                    example: "2.0.0"
                  deactivatedCount:
                    type: integer
                    description: "Number of previously active questionnaires deactivated."
                    example: 1
                  message:
                    type: string
                    example: "Questionnaire v2.0.0 created. 1 previous version(s) deactivated."
        '400':
          description: Version already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Questionnaire version 2.0.0 already exists."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # ── Admin – Audit ─────────────────────────────────────────────────────────────
  /api/v1/admin/audit-logs:
    get:
      tags: [Admin – Audit]
      summary: List audit logs
      operationId: listAuditLogs
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Matching ──────────────────────────────────────────────────────────────────
  /api/v1/matching/candidates/{applicantId}:
    get:
      tags: [Matching]
      summary: Get top match candidates for an applicant
      operationId: getCandidates
      description: |
        Returns the top N candidates scored against the given applicant using
        the selected algorithm. Returns aliases and scores only — no PII.
      parameters:
        - name: applicantId
          in: path
          required: true
          schema:
            type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        - name: top
          in: query
          description: "Maximum number of candidates to return (clamped to 1–50)."
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: algorithm
          in: query
          schema:
            type: string
            enum: [baseline, cosine, embedding-cosine]
            default: embedding-cosine
            description: >
              Defaults to `embedding-cosine` (recommended for multilingual applicant pools).
              `baseline` and `cosine` use keyword overlap on free-text fields and may produce
              poor results when applicants filled the form in different languages (EN/DE/FR/AR).
      responses:
        '200':
          description: Ranked candidate list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidatesResponse'
              example:
                success: true
                applicantId: "64f1a2b3c4d5e6f7a8b9c0d1"
                candidates:
                  - alias: "Silent River"
                    applicantId: "64f1a2b3c4d5e6f7a8b9c0d3"
                    score: 0.83
                    breakdown:
                      numeric_compatibility: 0.91
                      lifestyle_similarity: 0.78
                      character_cross_match: 0.85
                      character_a_wants_b: 0.88
                      character_b_wants_a: 0.82
                      deal_breaker_penalty: 0.94
        '400':
          description: Invalid applicant ID or unknown algorithm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Applicant not found or inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/matching/last-run:
    get:
      tags: [Matching]
      summary: Get the most recent matching pass summary (admin only)
      operationId: getMatchingLastRun
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: |
        Returns the persisted summary of the last matching pass (manual or
        scheduled), or `null` if matching has never run. Stored in the
        `app_config` collection under the `matching.lastRun` key.
      responses:
        '200':
          description: Last-run summary, or null when matching has never run
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    nullable: true
                    type: object
                    properties:
                      at:
                        type: string
                        format: date-time
                      algorithm:
                        type: string
                      totalApplicants:
                        type: integer
                      couplesProposed:
                        type: integer
                      durationMs:
                        type: integer
                      triggeredBy:
                        type: string
                        enum: [admin, scheduler]
              example:
                success: true
                data:
                  at: "2026-06-10T09:03:55.643Z"
                  algorithm: "embedding-cosine"
                  totalApplicants: 97
                  couplesProposed: 667
                  durationMs: 25
                  triggeredBy: "admin"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/matching/run:
    post:
      tags: [Matching]
      summary: Run a full matching pass (admin only)
      operationId: runMatching
      security:
        - CookieAuth: []
        - BearerAuth: []
      description: |
        Scores all active applicants pairwise and returns a map of
        `applicantId → top 10 ranked candidates`. Computationally
        O(n²) — intended for offline/scheduled use, not real-time.

        For `embedding-cosine`, embeddings are loaded from the DB (written at
        form submission time). Only missing or stale embeddings trigger API
        calls — in steady state this is O(1) extra work.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchingRunRequest'
            examples:
              baseline:
                summary: "Fast rule-based scoring"
                value:
                  algorithm: "baseline"
              cosine:
                summary: "Cosine similarity (bag-of-words)"
                value:
                  algorithm: "cosine"
              embedding-cosine:
                summary: "Embedding-based cosine (semantic)"
                value:
                  algorithm: "embedding-cosine"
      responses:
        '200':
          description: Full matching results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchingRunResponse'
              example:
                success: true
                algorithm: "embedding-cosine"
                totalApplicants: 42
                durationMs: 310
                results:
                  "64f1a2b3c4d5e6f7a8b9c0d1":
                    - alias: "Silent River"
                      applicantId: "64f1a2b3c4d5e6f7a8b9c0d3"
                      score: 0.83
                      breakdown:
                        relationship_type: 1.0
                        deal_breakers: 0.9
                        religion_compatibility: 0.5
                        affection_importance: 0.78
                        long_distance: 1.0
                        lifestyle: 0.6
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: No active questionnaire or other server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Profile – Applicant Self-Service Portal ───────────────────────────────
  /api/v1/profile/login:
    post:
      tags: [Profile]
      summary: Applicant portal login
      operationId: profileLogin
      description: |
        Identifies an applicant by `magicToken` and verifies their password.

        **Two possible success responses (both 200):**
        - `{ success: true }` + `Set-Cookie: ons_applicant_session=<jwt>` — password
          verified, session cookie set, proceed to dashboard
        - `{ firstLogin: true }` — account has no password yet; redirect to
          `POST /api/v1/profile/set-password` before setting the cookie

        `password` is optional — omitting it is the idiomatic way to trigger a
        first-login check without attempting verification.

        **Rate limit:** 10 requests per minute per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileLoginRequest'
            examples:
              with_password:
                summary: Returning user with password set
                value:
                  magicToken: "a3f9d2c1e4b7089f4a2c8d1e6f3b9a0c..."
                  password: "amber-river-silent-fox"
              first_login_check:
                summary: First-login check (no password yet)
                value:
                  magicToken: "a3f9d2c1e4b7089f4a2c8d1e6f3b9a0c..."
      responses:
        '200':
          description: Session cookie set, or first-login detected
          headers:
            Set-Cookie:
              description: |
                `ons_applicant_session=<jwt>; Path=/; HttpOnly; SameSite=Lax`
                Present only when `firstLogin` is absent (password verified).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileLoginResponse'
              examples:
                authenticated:
                  summary: Password correct — session cookie set
                  value:
                    success: true
                first_login:
                  summary: No password set — redirect to set-password
                  value:
                    success: true
                    firstLogin: true
        '401':
          description: Unknown magic token or wrong password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Invalid credentials"
        '422':
          description: Validation error (token wrong length)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/profile/me:
    get:
      tags: [Profile]
      summary: Get my profile
      operationId: getMyProfile
      security:
        - ApplicantCookieAuth: []
        - ApplicantBearerAuth: []
      description: |
        Returns the authenticated applicant's non-sensitive profile:
        alias, status, score threshold, and creation date.
        No Instagram handle or other PII is included.
      responses:
        '200':
          description: Applicant profile
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/ApplicantProfileView'
              example:
                success: true
                data:
                  applicantId: "64f1a2b3c4d5e6f7a8b9c0d1"
                  alias: "Blue Falcon"
                  status: "matched"
                  scoreThreshold: 0.8
                  createdAt: "2026-06-01T12:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/profile/matches:
    get:
      tags: [Profile]
      summary: List my matches
      operationId: getMyMatches
      security:
        - ApplicantCookieAuth: []
        - ApplicantBearerAuth: []
      description: |
        Returns the authenticated applicant's matches, filtered by score threshold.
        Instagram handles are never included — the `perspective` field tells the
        frontend which UI to render for each card.

        When the applicant's status is `dating`, only the single `dating` match
        is returned — other matches are hidden.
      parameters:
        - name: threshold
          in: query
          schema:
            type: number
            format: float
            minimum: 0.6
            maximum: 1.0
            default: 0.8
          description: "Minimum score (clamped to [0.6, 1.0]). Defaults to the applicant's saved threshold."
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
          description: "Maximum number of matches to return."
      responses:
        '200':
          description: Match list
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApplicantMatchView'
              example:
                success: true
                data:
                  - matchId: "64f1a2b3c4d5e6f7a8b9c0d5"
                    partnerAlias: "Silent River"
                    score: 0.83
                    status: "proposed"
                    perspective: "none"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/profile/matches/{id}/contact:
    post:
      tags: [Profile]
      summary: Request contact — reveal partner's Instagram
      operationId: requestContact
      security:
        - ApplicantCookieAuth: []
        - ApplicantBearerAuth: []
      description: |
        Initiates the contact flow for a `proposed` match:
        1. Decrypts the partner's Instagram handle (audit-logged as `APPLICANT_REVEAL_IDENTITY`)
        2. Generates AI ice-breakers and date ideas tailored to both profiles
        3. Transitions match → `in_progress`; sets the authenticated applicant as `initiatorId`

        The partner's Instagram is returned **only** to the initiator in this response —
        it is never exposed to the target or in any other endpoint.

        Returns 403 if the applicant is not part of this match, or if the match is not `proposed`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Match MongoDB ObjectId
          example: "64f1a2b3c4d5e6f7a8b9c0d5"
      responses:
        '200':
          description: Contact initiated — partner's Instagram + conversation starters returned
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/ContactResult'
              example:
                success: true
                data:
                  targetInstagram: "@partner_handle"
                  iceBreakers:
                    - "What's the most spontaneous trip you've taken?"
                    - "What does your ideal Sunday look like?"
                  dateIdeas:
                    - "Coffee walk through the old city"
                    - "Sunset picnic with homemade snacks"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a participant in this match, or match is not in `proposed` state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/profile/matches/{id}/respond:
    post:
      tags: [Profile]
      summary: Respond to a contact request
      operationId: respondToContact
      security:
        - ApplicantCookieAuth: []
        - ApplicantBearerAuth: []
      description: |
        Called by the **target** of a contact request (the non-initiator) to accept or decline.

        **Accept (`accept: true`):**
        - Match → `dating`
        - Both applicants → `dating`
        - All other `proposed`/`in_progress` matches for both applicants → `expired`

        **Decline (`accept: false`):**
        - Match → `declined`
        - No applicant status changes

        Returns 403 if called by the initiator (you cannot respond to your own request)
        or if the match is not in `in_progress` state.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accept]
              properties:
                accept:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Response recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
              example:
                success: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Called by initiator, or match not in `in_progress` state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (`accept` field missing or not boolean)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/profile/matches/{id}/outcome:
    post:
      tags: [Profile]
      summary: Report match outcome
      operationId: reportOutcome
      security:
        - ApplicantCookieAuth: []
        - ApplicantBearerAuth: []
      description: |
        Either applicant in a `dating` or `in_progress` match can self-report the outcome.

        **`success`:** match → `success`; both applicants → `inactive` (deletion in 180 days)

        **`failed`:** match → `failed`; both applicants → `applied` (re-enters matching pool)

        Returns 403 if the applicant is not part of this match or the match is not in
        an appropriate state (`dating` or `in_progress`).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outcome]
              properties:
                outcome:
                  type: string
                  enum: [success, failed]
                  example: "failed"
      responses:
        '200':
          description: Outcome recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
              example:
                success: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a participant, or match not in a reportable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (invalid outcome value)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/profile/deactivate:
    post:
      tags: [Profile]
      summary: Deactivate my account
      operationId: deactivateMyAccount
      security:
        - ApplicantCookieAuth: []
        - ApplicantBearerAuth: []
      description: |
        Deactivates the authenticated applicant's account:
        - Status → `inactive`; `deletionScheduledAt` = now + 180 days
        - All `proposed`/`in_progress` matches → `expired`
        - No data is deleted immediately
        - Clears the `ons_applicant_session` cookie

        Idempotent — safe to call on an already-inactive account.
      responses:
        '200':
          description: Account deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
              example:
                success: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/profile/set-password:
    post:
      tags: [Profile]
      summary: Set password on first login
      operationId: setPassword
      description: |
        Sets the applicant's password for the first time. Only works when
        `passwordHash` is null (account never had a password set).

        On success the password is stored as a bcrypt hash and the
        `ons_applicant_session` HttpOnly cookie is set, logging the applicant
        in immediately — no token is returned in the response body.

        Use `GET /api/v1/profile/suggest-password` to offer a generated passphrase.

        **Rate limit:** 10 requests per minute per IP (shared with login).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [magicToken, newPassword]
              properties:
                magicToken:
                  type: string
                  format: hex
                  minLength: 64
                  maxLength: 64
                  example: "a3f9d2c1e4b7089f4a2c8d1e6f3b9a0c..."
                newPassword:
                  type: string
                  minLength: 8
                  example: "amber-river-silent-fox"
      responses:
        '200':
          description: Password set — session cookie set
          headers:
            Set-Cookie:
              description: |
                `ons_applicant_session=<jwt>; Path=/; HttpOnly; SameSite=Lax`
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    enum: [true]
              example:
                success: true
        '401':
          description: Unknown magic token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Password already set — use change-password instead
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Password already set. Use change-password to update it."
        '422':
          description: Validation error (token wrong length, password too short)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/profile/suggest-password:
    get:
      tags: [Profile]
      summary: Get a suggested passphrase
      operationId: suggestPassword
      description: |
        Returns a randomly generated 4-word passphrase from a curated word pool.
        No authentication required.

        Intended as a convenience option in set-password and change-password forms.
        The suggestion is never stored — call again for a fresh one.
      responses:
        '200':
          description: Suggested passphrase
          content:
            application/json:
              schema:
                type: object
                required: [success, suggestion]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  suggestion:
                    type: string
                    example: "amber-river-silent-fox"

  /api/v1/profile/change-password:
    post:
      tags: [Profile]
      summary: Change password
      operationId: changePassword
      security:
        - ApplicantCookieAuth: []
        - ApplicantBearerAuth: []
      description: |
        Changes the authenticated applicant's password. Requires the current
        password for verification.

        Returns 400 if no password has been set yet (use `POST /set-password` first).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  example: "amber-river-silent-fox"
                newPassword:
                  type: string
                  minLength: 8
                  example: "cascade-stone-swift-oak"
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
              example:
                success: true
        '400':
          description: No password set yet — use set-password first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated, or current password is incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (new password too short)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

# ── Ons — production-grade Compose ────────────────────────────────────────────
#
# Usage:
#   Dev   (mongo in Docker): docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev  up --build -d
#   Prod  (external mongo):  docker compose                                                 --env-file .env.prod up --build -d
#
# Architecture:
#   internet → nginx:80 ─┬─ /*       → static SPA  (frontend)
#                        └─ /api/*   → api:3001     (internal only)
#
# The API is never exposed externally — all traffic enters through nginx.
# VITE_API_URL must be empty so the browser uses relative paths (same origin).
#
# Variables consumed from the env file:
#   Required : MONGODB_URI  ENCRYPTION_KEY  JWT_SECRET  FORM_SECRET  VITE_INVITE_KEY
#   Optional : NODE_ENV (production)  PORT (3001)  HTTP_PORT (80)  VITE_API_URL ("")
#
# See api/.env.example for the full reference.

name: ons

services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: ons-api:latest
    container_name: ons-api
    restart: unless-stopped
    networks:
      - ons-net
    expose:
      - "${PORT:-3001}" # internal only — nginx proxies, nothing else
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${PORT:-3001}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 15s

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  # Serves the static SPA and reverse-proxies /api/* to the api service.
  # VITE_API_URL is intentionally empty: relative paths hit nginx → api.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_INVITE_KEY: ${VITE_INVITE_KEY:?VITE_INVITE_KEY must be set}
    image: ons-frontend:latest
    container_name: ons-frontend
    restart: unless-stopped
    networks:
      - ons-net
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 32M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 5s

networks:
  ons-net:
    driver: bridge
